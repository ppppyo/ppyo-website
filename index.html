<html lang="ko">
<head>

  <title>My Page</title>

    body {
      font-family: Arial, sans-serif;
      margin: 0;

    <h1>환영합니다</h1>
    <p>이 파일은 기본적인 HTML 예시입니다.</p>
    <button onclick="alert('버튼을 눌렀습니다!')">클릭해보세요</button>
  </div>

</html>
